<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{fragments/layout}">

<head>
    <title layout:fragment="title">Menu | Gustea's Restaurant</title>
    <!-- Page-specific head (optional) -->
</head>

<main layout:fragment="content">
    <section id="menu" class="max-w-7xl mx-auto py-20 px-6 sm:px-8">
        <h2 class="text-6xl text-center font-heading text-gold mb-20">The Signature Menu</h2>
        <div class="space-y-16">

            <!-- Appetizers -->
            <div>
                <h3 class="text-4xl font-heading text-white border-b border-gold/50 pb-4 mb-8">Appetizers</h3>
                <div class="grid lg:grid-cols-3 md:grid-cols-2 gap-10">
                    <div class="bg-zinc-800 p-4 rounded-lg shadow-lg flex flex-col">
                        <div class="w-full h-48 mb-4 overflow-hidden rounded-md">
                            <img th:src="@{/images/menu/scallops.jpg}" alt="Seared Scallops"
                                 class="w-full h-full object-cover"
                                 onerror="this.src='https://placehold.co/400x200/2A2A2A/D4AF37?text=Seared+Scallops'">
                        </div>
                        <div class="flex flex-col flex-grow">
                            <p class="text-2xl font-heading text-white mb-1">Seared Scallops</p>
                            <p class="text-gray-400 text-sm italic flex-grow mb-3">With saffron foam, pea purée, and caviar garnish.</p>
                            <div class="flex justify-between items-center pt-2 border-t border-zinc-700">
                                <span class="text-xl font-bold text-gold">$32</span>
                                <button onclick="addToCart(1, 'Seared Scallops', 32)"
                                        class="text-sm bg-gold text-zinc-900 py-1 px-4 rounded font-semibold hover:bg-yellow-500">
                                    Add
                                </button>
                            </div>
                        </div>
                    </div>
                    <!-- Add other items the same way... -->
                </div>
            </div>

            <!-- Main Courses & Desserts – copy your full items here -->

        </div>
    </section>
</main>

</html>
